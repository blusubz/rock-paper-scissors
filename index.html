<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="data:,">
        <title>RPS | Game</title>
        <script src="script.js" defer></script>
    </head>
    <body>
        <h1 style="text-align: center;">Rock Paper Scissors Console Game</h1>
        <p style="text-align: center;">
            Simply open the console to play game. Best out of 5 rounds wins.
        </p>

        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>

        <div id="results"> 
            <!-- Here goes the screen display of the game instead of going in the console-->
        </div>
       <br><br>

        <h2>
            <p id="humanScore"></p>
            <p id="computerScore"></p>
        </h2>

        <h3 id="gameResults">

        </h3>

        <h1 id="gameOver"></h1>
        <button id="restart" style="display: none; background-color: blue; color:yellow">Restart Game</button>

    </body>
</html>
